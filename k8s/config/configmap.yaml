apiVersion: v1
kind: ConfigMap
metadata:
  name: mern-config
  namespace: mern-todo
  labels:
    app: mern-todo
    component: config
data:
  # Backend configuration
  MONGO_DATABASE: todo
  MONGO_HOST: mongodb
  MONGO_PORT: "27017"
  BACKEND_PORT: "5000"
  NODE_ENV: "production"
  
  # Frontend configuration
  VITE_API_BASE_URL: "http://mern-todo-backend:5000/api"
  
  # MongoDB configuration
  MONGODB_INITDB_DATABASE: todo

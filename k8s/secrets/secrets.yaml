apiVersion: v1
kind: Secret
metadata:
  name: mern-secrets
  namespace: mern-todo
  labels:
    app: mern-todo
    component: secrets
type: Opaque
stringData:
  # MongoDB credentials - NOT used in this setup (no auth), but here for reference
  MONGODB_ADMIN_USER: "admin"
  MONGODB_ADMIN_PASSWORD: "password123"
  
  # Connection strings
  MONGODB_ATLAS_CONNECTION: "mongodb://mongodb:27017/todo"
  
  # JWT secret (if needed for future auth implementation)
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  
  # API keys (placeholder)
  API_KEY: "your-api-key-here"
---
apiVersion: v1
kind: Secret
metadata:
  name: mern-docker-registry
  namespace: mern-todo
  labels:
    app: mern-todo
type: kubernetes.io/dockercfg
data:
  # Base64 encoded docker config - configure for your registry
  .dockercfg: eyJhdXRocyI6e319

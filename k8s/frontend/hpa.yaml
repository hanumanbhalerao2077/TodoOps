apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mern-todo-frontend-hpa
  namespace: mern-todo
  labels:
    app: mern-todo
    component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mern-todo-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50

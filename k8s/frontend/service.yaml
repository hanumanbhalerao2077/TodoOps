apiVersion: v1
kind: Service
metadata:
  name: mern-todo-frontend
  namespace: mern-todo
  labels:
    app: mern-todo
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: mern-todo
    component: frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  sessionAffinity: None

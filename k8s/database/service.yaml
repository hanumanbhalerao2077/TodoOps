apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: mern-todo
  labels:
    app: mern-todo
    component: database
  annotations:
    description: "MongoDB Service for MERN stack"
spec:
  type: ClusterIP
  selector:
    app: mern-todo
    component: database
  ports:
  - name: mongodb
    port: 27017
    targetPort: mongodb
    protocol: TCP
  sessionAffinity: None

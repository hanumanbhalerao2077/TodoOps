apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-todo-backend
  namespace: mern-todo
  labels:
    app: mern-todo
    component: backend
    version: v1
spec:
  # Number of replicas for load balancing
  replicas: 3
  
  # Update strategy - RollingUpdate for zero-downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  # Pod selector
  selector:
    matchLabels:
      app: mern-todo
      component: backend
  
  # Pod template
  template:
    metadata:
      labels:
        app: mern-todo
        component: backend
        version: v1
      annotations:
        prometheus.io/scrape: "false"
        description: "Backend API pods"
    spec:
      # DNS and restart policy
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      
      # Containers
      containers:
      - name: backend
        # Use your Docker registry here
        image: mern-todo-backend:latest
        imagePullPolicy: Never
        
        # Ports
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        
        # Environment variables
        env:
        # From ConfigMap
        - name: MONGO_HOST
          valueFrom:
            configMapKeyRef:
              name: mern-config
              key: MONGO_HOST
        - name: MONGO_PORT
          valueFrom:
            configMapKeyRef:
              name: mern-config
              key: MONGO_PORT
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mern-config
              key: MONGO_DATABASE
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mern-config
              key: NODE_ENV
        - name: BACKEND_PORT
          valueFrom:
            configMapKeyRef:
              name: mern-config
              key: BACKEND_PORT
        
        # From Secrets
        - name: MONGODB_ATLAS_CONNECTION
          valueFrom:
            secretKeyRef:
              name: mern-secrets
              key: MONGODB_ATLAS_CONNECTION
        
        # Port as env var
        - name: PORT
          value: "5000"
        
        # Resource management
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        # Startup probe - allow time for server to start
        startupProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 30
        
        # Liveness probe - restart if stuck
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe - ready to serve traffic
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      
      # Pod affinity for distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mern-todo
                - key: component
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname

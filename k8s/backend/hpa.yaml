apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mern-todo-backend-hpa
  namespace: mern-todo
  labels:
    app: mern-todo
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mern-todo-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60

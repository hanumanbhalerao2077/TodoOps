name: Docker Build & Deploy

# Trigger on push to main branch
on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-test:
    name: Build Images & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: server
          push: false
          tags: mern-todo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: client
          push: false
          tags: mern-todo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-docker-compose:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services with docker-compose
        run: docker-compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for backend health check..."
          timeout 60 bash -c 'until curl -f http://localhost:5000/; do sleep 2; done'
          echo "Backend is healthy!"
          
          echo "Waiting for frontend health check..."
          timeout 60 bash -c 'until curl -f http://localhost:3000/; do sleep 2; done'
          echo "Frontend is healthy!"

      - name: Verify MongoDB connection
        run: |
          docker exec mongodb mongosh --eval "db.adminCommand('ping')" 2>/dev/null && \
          echo "MongoDB is healthy!" || echo "MongoDB health check skipped"

      - name: Check backend endpoint
        run: curl -v http://localhost:5000/ || true

      - name: Cleanup services
        if: always()
        run: docker-compose down

  security-scan-docker:
    name: Security Scan Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend for scanning
        uses: docker/build-push-action@v5
        with:
          context: server
          push: false
          tags: mern-todo-backend:scan
          load: true

      - name: Build frontend for scanning
        uses: docker/build-push-action@v5
        with:
          context: client
          push: false
          tags: mern-todo-frontend:scan
          load: true

      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mern-todo-backend:scan'
          format: 'sarif'
          output: 'trivy-backend.sarif'

      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mern-todo-frontend:scan'
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: |
            trivy-backend.sarif
            trivy-frontend.sarif
